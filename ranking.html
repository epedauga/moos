<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kissé Ranking</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Montserrat',sans-serif;
  background:#0f0f12;
  color:#fbf4e8;
  display:flex;
  justify-content:center;
}

.app{
  width:100%;
  max-width:480px;
  padding:30px 20px;
}

/* TITLES */
h1{
  font-family:'Bebas Neue';
  font-size:60px;
  text-align:center;
  margin-bottom:20px;
}

/* BEST WEEK */
.best-week{
  background:linear-gradient(135deg,#c35b8e,#8b3a62);
  border-radius:18px;
  padding:20px;
  text-align:center;
  margin-bottom:25px;
}

.best-week h3{
  font-size:14px;
  opacity:.8;
}

.best-week p{
  font-size:22px;
  font-weight:600;
}

.best-week span{
  font-size:12px;
  opacity:.7;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:12px;
}

th{
  font-size:12px;
  opacity:.6;
}

tr{
  border-bottom:1px solid rgba(255,255,255,0.06);
}

tr:first-child{
  color:#c35b8e;
  font-weight:600;
}

/* LOADING */
.loading{
  text-align:center;
  opacity:.6;
}

</style>
</head>

<body>

<div class="app">

  <h1>RANKING</h1>

  <div class="best-week" id="bestWeek" style="display:none;"></div>

  <div class="loading" id="loading">Cargando...</div>

  <table id="ranking" style="display:none;">
    <thead>
      <tr>
        <th>#</th>
        <th>Jugador</th>
        <th>Puntos</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script>

// 🔗 PEGAR CSV
const URL = "PEGÁ_ACÁ_TU_CSV";

async function loadData(){

  const res = await fetch(URL);
  const text = await res.text();

  const rows = text.trim().split("\n").slice(1);

  const data = rows.map(r=>{
    const [name, week, points] = r.split(",");
    return {
      name: name.trim(),
      week: week.trim(),
      points: Number(points)
    };
  });

  renderRanking(data);
  renderBestWeek(data);

  document.getElementById("loading").style.display = "none";
  document.getElementById("ranking").style.display = "table";
}


// 🏆 RANKING GENERAL
function renderRanking(data){

  const totals = {};

  data.forEach(p=>{
    totals[p.name] = (totals[p.name] || 0) + p.points;
  });

  const sorted = Object.entries(totals)
    .sort((a,b)=>b[1]-a[1]);

  const tbody = document.querySelector("#ranking tbody");

  sorted.forEach((p,i)=>{
    tbody.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${p[0]}</td>
        <td>${p[1]}</td>
      </tr>
    `;
  });
}


// 🔥 MEJOR DE LA SEMANA (ÚLTIMA)
function renderBestWeek(data){

  const weeks = {};

  data.forEach(p=>{
    if(!weeks[p.week]) weeks[p.week] = {};
    weeks[p.week][p.name] = (weeks[p.week][p.name] || 0) + p.points;
  });

  // última semana
  const lastWeek = Object.keys(weeks).sort().pop();

  const sorted = Object.entries(weeks[lastWeek])
    .sort((a,b)=>b[1]-a[1]);

  const winner = sorted[0];

  const box = document.getElementById("bestWeek");

  box.innerHTML = `
    <h3>🔥 Mejor jugador - ${lastWeek}</h3>
    <p>${winner[0]}</p>
    <span>${winner[1]} puntos</span>
  `;

  box.style.display = "block";
}


loadData();

</script>

</body>
</html>
