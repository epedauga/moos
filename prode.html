<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PRODE Kissé</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background-color: #E7C7CD;
      color: #3D5A98;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 30px;
      font-weight: 500;
    }

    .card {
      background-color: #F3E6E8;
      padding: 18px;
      margin: 12px 0;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      text-decoration: none;
      color: #8C5A6B;
      font-weight: bold;
      display: block;
      transition: 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }

    .highlight {
      background-color: #3D5A98;
      color: white;
    }

    .small {
      font-size: 14px;
      margin-top: 10px;
      color: #8C5A6B;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>KISSÉ</h1>
    <h2>PRODE MUNDIALISTA ⚽🍰</h2>

    <a href="LINK_A_TU_FORM" class="card highlight">
      🎯 Jugar al PRODE
    </a>

    <a href="#" class="card">
      📖 ¿Cómo funciona?
    </a>

    <a href="#" class="card">
      🏆 Ver ranking
    </a>

    <a href="#" class="card">
      🎁 Premio
    </a>

    <p class="small">
      Completá tu pronóstico y participá por un box Kissé ✨
    </p>
  </div>

</body>
</html>
