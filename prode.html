<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PRODE Kissé</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #F3E6E8, #E7C7CD);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CONTENEDOR */
.wrapper {
  width: 90%;
  max-width: 420px;
}

/* CARD CENTRAL */
.card {
  background: rgba(255,255,255,0.45);
  backdrop-filter: blur(14px);
  border-radius: 28px;
  padding: 28px 22px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.12);
  text-align: center;
}

/* TITULOS */
.logo {
  font-size: 36px;
  color: #3D5A98;
  margin-bottom: 5px;
  letter-spacing: 2px;
}

.title {
  font-size: 20px;
  color: #3D5A98;
  margin-bottom: 10px;
}

.desc {
  font-size: 14px;
  color: #8C5A6B;
  margin-bottom: 25px;
}

/* CTA PRINCIPAL */
.cta {
  display: block;
  background: #3D5A98;
  color: white;
  padding: 18px;
  border-radius: 999px;
  text-decoration: none;
  font-weight: bold;
  margin-bottom: 20px;
  box-shadow: 0 10px 25px rgba(61,90,152,0.35);
  transition: 0.25s;
}

.cta:hover {
  transform: translateY(-2px) scale(1.01);
}

/* LINKS SECUNDARIOS */
.links {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.link {
  padding: 14px;
  border-radius: 14px;
  background: rgba(255,255,255,0.6);
  text-decoration: none;
  color: #8C5A6B;
  font-size: 14px;
  transition: 0.2s;
}

.link:hover {
  background: rgba(255,255,255,0.9);
}

/* FOOTER */
.footer {
  margin-top: 18px;
  font-size: 12px;
  color: #8C5A6B;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card">

    <div class="logo">KISSÉ</div>
    <div class="title">PRODE MUNDIALISTA ⚽🍰</div>
    <div class="desc">
      Jugá, acertá y ganá un box Kissé.
    </div>

    <a href="LINK_A_TU_FORM" class="cta">
      JUGAR AHORA
    </a>

    <div class="links">
      <a href="#" class="link">¿Cómo funciona?</a>
      <a href="#" class="link">Ver ranking</a>
      <a href="#" class="link">Premio</a>
    </div>

    <div class="footer">
      Cupos limitados · Cierra pronto
    </div>

  </div>
</div>

</body>
</html>
